# Local development: Next.js + FastAPI with hot reload. No host Node/Python install required.
#
# Prerequisite: apps/web/.env.local (Firebase). For /chat: apps/api/.env.local with GOOGLE_API_KEY.
#
#   docker compose up --build
#
# Web: http://localhost:3000  ·  API: http://localhost:8000/health

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - path: ./apps/web/.env.local
        required: false
    environment:
      # Helps file watching when the app directory is bind-mounted (esp. Windows / Docker Desktop).
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: ./apps/api/.env.local
        required: false
    volumes:
      - ./apps/api:/app
    depends_on:
      - elasticsearch

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

volumes:
  web_node_modules:
  es_data:
